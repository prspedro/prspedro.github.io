<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pedro Rodrigues Soares — Terminal</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="image-slot.js"></script>
<script src="tech-icons.js"></script>
<style>
  :root {
    --bg: oklch(0.16 0.012 250);
    --bg-2: oklch(0.19 0.013 250);
    --bar: oklch(0.22 0.013 250);
    --border: oklch(0.30 0.012 250);
    --text: oklch(0.90 0.006 250);
    --muted: oklch(0.62 0.012 250);
    --dim: oklch(0.50 0.012 250);
    --accent: oklch(0.65 0.17 250);
    --accent-soft: oklch(0.65 0.17 250 / 0.14);
    --green: oklch(0.74 0.16 155);
    --amber: oklch(0.80 0.13 80);
    --red: oklch(0.68 0.18 25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, oklch(0.65 0.17 250 / 0.10), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 15px;
    line-height: 1.65;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vw, 40px);
    min-height: 100vh;
  }
  .window {
    width: min(960px, 100%);
    height: min(86vh, 760px);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 40px 120px -30px rgba(0,0,0,0.7), 0 0 0 1px oklch(0.65 0.17 250 / 0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .titlebar {
    height: 44px;
    flex: none;
    background: var(--bar);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 16px;
  }
  .dots { display: flex; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: var(--red); }
  .dot.y { background: var(--amber); }
  .dot.g { background: var(--green); }
  .titlebar .path { color: var(--dim); font-size: 13px; letter-spacing: 0.02em; }
  .titlebar .right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .langbtn {
    font-family: inherit;
    font-size: 12px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .langbtn:hover { color: var(--text); border-color: var(--accent); }
  .langbtn .on { color: var(--accent); }
  .screen {
    flex: 1;
    overflow-y: auto;
    padding: 22px 24px 8px;
    scroll-behavior: smooth;
  }
  .screen::-webkit-scrollbar { width: 10px; }
  .screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  .screen::-webkit-scrollbar-track { background: transparent; }

  .line { white-space: pre-wrap; word-break: break-word; }
  .block { margin: 2px 0 16px; }
  .muted { color: var(--muted); }
  .dim { color: var(--dim); }
  .accent { color: var(--accent); }
  .green { color: var(--green); }
  .amber { color: var(--amber); }
  .bold { font-weight: 700; color: var(--text); }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
  a:hover { border-bottom-color: var(--accent); }

  .prompt { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .prompt .who { color: var(--green); }
  .prompt .sep { color: var(--dim); }
  .prompt .dir { color: var(--accent); }
  .cmd { color: var(--text); }

  .inputline { display: flex; gap: 8px; align-items: baseline; padding-bottom: 18px; }
  .inputline input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: inherit;
    caret-color: var(--accent);
  }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 2px; }
  .chip {
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { color: var(--text); border-color: var(--accent); background: var(--accent-soft); }
  .chip .k { color: var(--accent); }

  .kv { display: grid; grid-template-columns: 130px 1fr; gap: 2px 18px; }
  .kv dt { color: var(--muted); }
  .kv dd { color: var(--text); }
  .skillrow { display: grid; grid-template-columns: 150px 1fr; gap: 3px 16px; align-items: start; margin-bottom: 7px; }
  .skillrow .label { color: var(--accent); }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { display: inline-flex; align-items: center; gap: 6px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 13px; }

  .project { border-left: 2px solid var(--border); padding: 2px 0 2px 14px; margin-bottom: 14px; }
  .project:hover { border-left-color: var(--accent); }
  .project .ptitle { color: var(--text); font-weight: 700; }
  .project .ptitle a { border-bottom: 1px dashed transparent; }
  .project .ptitle a:hover { border-bottom-color: var(--accent); }
  .project .pmeta { color: var(--dim); font-size: 13px; }

  .avatar { width: 92px; height: 92px; border: 1px solid var(--border); border-radius: 8px; }
  .whorow { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }

  .cursor { display: inline-block; width: 9px; height: 1.05em; background: var(--accent); vertical-align: text-bottom; animation: blink 1.05s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  image-slot::part(frame) { background: oklch(0.25 0.012 250); }
  image-slot::part(empty) { color: oklch(0.74 0.012 250); }

  .lang-en { display: none; }
  body[data-lang="en"] .lang-en { display: inline; }
  body[data-lang="en"] .lang-pt { display: none; }
  .b.lang-en { display: none; }
  body[data-lang="en"] .b.lang-en { display: block; }
  body[data-lang="en"] .b.lang-pt { display: none; }

  @media (max-width: 560px) {
    body { padding: 0; }
    .window { height: 100vh; width: 100%; border-radius: 0; border: none; }
    .kv, .skillrow { grid-template-columns: 1fr; }
  }
</style>
</head>
<body data-lang="pt">
  <main class="window" role="application" aria-label="Terminal portfolio">
    <header class="titlebar">
      <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
      <span class="path">pedro@soares: ~/portfolio</span>
      <div class="right">
        <button class="langbtn" id="langbtn" aria-label="Toggle language">
          <span class="on" id="lpt">PT</span> <span class="dim">/</span> <span id="len">EN</span>
        </button>
      </div>
    </header>
    <div class="screen" id="screen">
      <div id="output"></div>
      <div class="inputline">
        <div class="prompt" aria-hidden="true">
          <span class="who">pedro</span><span class="sep">@</span><span class="who">soares</span><span class="sep">:</span><span class="dir">~</span><span class="sep">$</span>
        </div>
        <input id="cmd" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Command input" />
      </div>
    </div>
  </main>

<script>
(function () {
  const out = document.getElementById('output');
  const screen = document.getElementById('screen');
  const input = document.getElementById('cmd');
  let lang = 'pt';

  const T = {
    welcome: {
      pt: [
        "<span class='green'>Pedro Rodrigues Soares</span> — Engenheiro da Computação",
        "Bem-vindo(a) ao meu terminal. Digite um comando ou clique nas sugestões abaixo.",
        "Dica: comece com <span class='accent'>help</span> ou <span class='accent'>about</span>."
      ],
      en: [
        "<span class='green'>Pedro Rodrigues Soares</span> — Computer Engineer",
        "Welcome to my terminal. Type a command or click a suggestion below.",
        "Tip: start with <span class='accent'>help</span> or <span class='accent'>about</span>."
      ]
    },
    help: {
      pt: [
        ['about',      'quem sou eu'],
        ['skills',     'stack e tecnologias'],
        ['projects',   'projetos em destaque'],
        ['education',  'formação acadêmica'],
        ['experience', 'experiência profissional'],
        ['contact',    'como falar comigo'],
        ['lang',       'alternar PT / EN'],
        ['clear',      'limpar a tela']
      ],
      en: [
        ['about',      'who I am'],
        ['skills',     'stack & technologies'],
        ['projects',   'featured projects'],
        ['education',  'academic background'],
        ['experience', 'work experience'],
        ['contact',    'how to reach me'],
        ['lang',       'switch PT / EN'],
        ['clear',      'clear the screen']
      ]
    },
    about: {
      pt: "Olá! Sou o Pedro, engenheiro da computação apaixonado por transformar ideias em produtos.\nGosto de transitar entre áreas — num dia ajusto um pipeline de visão computacional, no outro\nentrego uma interface caprichada. Curioso por natureza e sempre aprendendo algo novo.",
      en: "Hi! I'm Pedro, a computer engineer who loves turning ideas into real products.\nI enjoy moving between fields — one day tuning a computer-vision pipeline, the next\nshipping a polished interface. Curious by nature and always learning something new."
    },
    notfound: {
      pt: (c) => `comando não encontrado: <span class='red'>${c}</span> — digite <span class='accent'>help</span>`,
      en: (c) => `command not found: <span class='red'>${c}</span> — type <span class='accent'>help</span>`
    }
  };

  const skills = [
    ['Frontend', ['React', 'Tailwind', 'Blade', 'JavaScript', 'TypeScript']],
    ['Backend', ['Laravel', 'PHP', 'Python', 'FastAPI']],
    ['Mobile', ['Flutter', 'Dart']],
    ['Game Dev', ['C++', 'Unreal Engine', 'Raylib']],
    ['Database', ['PostgreSQL', 'MySQL']],
    ['IA / ML', ['PyTorch', 'LLMs', 'Visão Computacional', 'OpenCV', 'EasyOCR']]
  ];

  // Adicionado o quarto parâmetro com as URLs específicas (GitHub ou Site)
  const projects = {
    pt: [
      ['Drakenval', 'Jogo de Estratégia em Tempo Real (RTS) em 3D com sistema de colisão e seleção de unidades.', 'C++ · Raylib', 'https://github.com/prspedro/Drakenval'],
      ['Drakenval (SDL)', 'Versão/Protótipo do ecossistema Drakenval utilizando a biblioteca gráfica SDL.', 'C++ · SDL', 'https://github.com/prspedro/Drakenval_sdl'],
      ['Ver-o-Guia', 'Plataforma web voltada para um guia de eventos locais.', 'Web · Domínios', 'https://veroguia.com.br'],
      ['VelocityNet', 'Ferramenta de visão computacional para monitoramento e medição da velocidade das águas nos canais urbanos.', 'Python · Visão Computacional · Machine Learning', 'https://github.com/prspedro/Velocitynet']
    ],
    en: [
      ['Drakenval', '3D Real-Time Strategy (RTS) game featuring collision systems and unit selection.', 'C++ · Raylib', 'https://github.com/prspedro/Drakenval'],
      ['Drakenval (SDL)', 'Drakenval ecosystem prototype version built using the SDL graphics library.', 'C++ · SDL', 'https://github.com/prspedro/Drakenval_sdl'],
      ['Ver-o-Guia', 'Web platform dedicated to a local event guide.', 'Web · Domains', 'https://veroguia.com.br'],
      ['VelocityNet', 'Computer vision tool for monitoring and measuring water speed in urban canals.', 'Python · Computer Vision · Machine Learning', 'https://github.com/prspedro/Velocitynet']
    ]
  };

  const education = {
    pt: [
      ['2006 — 2011', 'ENGENHARIA DA COMPUTAÇÃO · Graduação', 'UFPA — Universidade Federal do Pará'],
      ['2024 — 2026', 'INTELIGÊNCIA ARTIFICIAL E APRENDIZADO DE MÁQUINA · Especialização', 'PUC Minas']
    ],
    en: [
      ['2006 — 2011', 'Computer Engineering · B.Sc.', 'UFPA — Federal University of Pará'],
      ['2024 — 2026', 'Artificial Intelligence & Machine Learning · Post-graduate Specialization', 'PUC Minas']
    ]
  };

 const experience = {
    pt: [
      ['Dez 2025 — agora', 'Analista em Ciência e Tecnologia · Censipam', 'Atuação no Centro Gestor e Operacional do Sistema de Proteção da Amazônia, desenvolvendo soluções e rotinas tecnológicas em prol da região.'],
      ['Jun 2015 — Ago 2019', 'Analista de TI · SESI-PA', 'Desenvolvimento e manutenção no sistema de processos Fluig, programação em Java e construção de interfaces com HTML, CSS e JavaScript/JQuery.'],
      ['Jan 2016 — Mar 2016', 'Webmaster Autônomo', 'Desenvolvimento completo e manutenção do sistema web "Minhas Ilha: campos abertos Marajó" utilizando PHP e JQuery.'],
      ['Jun 2014 — Jul 2014', 'Webmaster (Freelancer) · CASF Seguros', 'Desenvolvimento, arquitetura e manutenção do portal corporativo da corretora utilizando o CMS Joomla.'],
      ['Out 2013 — Jan 2014', 'Webmaster · Opus Solute', 'Construção e manutenção de sites utilizando PHP, JavaScript, AJAX, HTML e Joomla.'],
      ['Jan 2009 — Set 2011', 'Programador Empreendedor · Constante & Soares', 'Engenharia de software e desenvolvimento de uma plataforma virtual focada em georreferenciamento, calendário de eventos e manipulação de mídia.']
    ],
    en: [
      ['Dec 2025 — now', 'Science and Technology Analyst · Censipam', 'Working at the Management and Operational Center of the Amazon Protection System, developing technological solutions for the region.'],
      ['Jun 2015 — Aug 2019', 'IT Analyst · SESI-PA', 'Developed and maintained the Fluig process system, Java programming, and frontend engineering with HTML, CSS, and JavaScript/JQuery.'],
      ['Jan 2016 — Mar 2016', 'Freelance Webmaster', 'Full-stack development and maintenance of the "Minhas Ilha: campos abertos Marajó" website using PHP and JQuery.'],
      ['Jun 2014 — Jul 2014', 'Freelance Webmaster · CASF Seguros', 'Developed and maintained the corporate web portal using the Joomla CMS.'],
      ['Oct 2013 — Jan 2014', 'Webmaster · Opus Solute', 'Built and maintained websites using PHP, JavaScript, AJAX, HTML, and Joomla.'],
      ['Jan 2009 — Sep 2011', 'Entrepreneur / Programmer · Constante & Soares', 'Software engineering and development of a virtual platform featuring georeferencing, event calendars, and media management.']
    ]
  };
  
  // Função responsável pelo efeito de digitação preservando o HTML
  async function typeWriter(html, parentElement, speed = 8) {
    const temp = document.createElement('div');
    temp.innerHTML = html;

    async function processNode(node, targetParent) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent;
        const targetNode = document.createTextNode('');
        targetParent.appendChild(targetNode);
        for (let i = 0; i < text.length; i++) {
          targetNode.textContent += text[i];
          scrollDown();
          await new Promise(r => setTimeout(r, speed));
        }
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        const clone = node.cloneNode(false);
        targetParent.appendChild(clone);
        for (const child of Array.from(node.childNodes)) {
          await processNode(child, clone);
        }
      }
    }

    for (const child of Array.from(temp.childNodes)) {
      await processNode(child, parentElement);
    }
  }

  function el(html) { const d = document.createElement('div'); d.innerHTML = html; return d.firstElementChild; }

  function printPrompt(cmd) {
    const p = el(`<div class="prompt"><span class="who">pedro</span><span class="sep">@</span><span class="who">soares</span><span class="sep">:</span><span class="dir">~</span><span class="sep">$</span> <span class="cmd">${cmd}</span></div>`);
    out.appendChild(p);
  }
  async function printBlock(node) {
    const b = document.createElement('div');
    b.className = 'block';
    out.appendChild(b);
    
    if (typeof node === 'string') {
      await typeWriter(node, b);
    } else {
      b.appendChild(node);
    }
    scrollDown();
  }
  function scrollDown() { requestAnimationFrame(() => { screen.scrollTop = screen.scrollHeight; }); }

  function renderHelp() {
    const rows = T.help[lang].map(([c, d]) => `<button class="chip" data-cmd="${c}"><span class="k">${c}</span> · ${d}</button>`).join('');
    return `<div class="muted lang-pt">Comandos disponíveis:</div><div class="muted lang-en">Available commands:</div><div class="chips">${rows}</div>`;
  }
  function renderAbout() {
    const slot = `<img id="pedro-photo" src="perfil.jpg" alt="Pedro Rodrigues Soares" style="width:92px;height:92px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex:none;" />`;
    return `<div class="whorow">${slot}<div><div class="bold">Pedro Rodrigues Soares</div><div class="line muted">${T.about[lang]}</div></div></div>`;
  }
  function renderSkills() {
    const rows = skills.map(([label, tags]) => {
      const t = tags.map(x => `<span class="tag">${window.techIcon(x, 15)}${x}</span>`).join('');
      return `<div class="skillrow"><span class="label">${label}</span><div class="tags">${t}</div></div>`;
    }).join('');
    return rows;
  }
  
  // Atualizado para englobar o título em uma tag <a> dinâmica com a URL alvo
  function renderProjects() {
    return projects[lang].map(([t, d, m, url]) =>
      `<div class="project"><div class="ptitle"><a href="${url}" target="_blank" rel="noopener noreferrer">${t}</a></div><div class="line muted">${d}</div><div class="pmeta">${m}</div></div>`
    ).join('');
  }
  function renderTimeline(data) {
    return data[lang].map(([when, what, where]) =>
      `<div class="project"><div class="ptitle">${what} <span class="dim">· ${when}</span></div><div class="line muted">${where}</div></div>`
    ).join('');
  }
  function renderContact() {
    return `<dl class="kv">
      <dt>email</dt><dd><a href="mailto:prspedro.soares@gmail.com">prspedro.soares@gmail.com</a></dd>
      <dt>github</dt><dd><a href="https://github.com/prspedro" target="_blank" rel="noopener">https://github.com/prspedro</a> <span class="dim"></span></dd>
      <dt>linkedin</dt><dd><a href="https://www.linkedin.com/in/pedro-soares-01867648/" target="_blank" rel="noopener">https://www.linkedin.com/in/pedro-soares-01867648/</a> <span class="dim"></span></dd>
    </dl>`;
  }
  const handlers = {
    help: async () => await printBlock(renderHelp()),
    about: async () => await printBlock(renderAbout()),
    whoami: async () => await printBlock(renderAbout()),
    skills: async () => await printBlock(renderSkills()),
    projects: async () => await printBlock(renderProjects()),
    education: async () => await printBlock(renderTimeline(education)),
    experience: async () => await printBlock(renderTimeline(experience)),
    contact: async () => await printBlock(renderContact()),
    clear: async () => { out.innerHTML = ''; await printBlock(renderHelp());},
    lang: async () => { await toggleLang(); },
    ls: async () => await printBlock(`<span class="muted">about  skills  projects  education  experience  contact</span>`)
  };

  async function run(raw) {
    const cmd = (raw || '').trim().toLowerCase();
    if (!cmd) { printPrompt(''); return; }
    
    input.disabled = true;
    printPrompt(cmd);
    
    if (handlers[cmd]) await handlers[cmd]();
    else await printBlock(T.notfound[lang](cmd));
    
    input.disabled = false;
    input.focus();
    scrollDown();
  }

  async function boot() {
    input.disabled = true;
    for (const l of T.welcome[lang]) {
      await printBlock(`<div class="line">${l}</div>`);
    }
    await printBlock(renderHelp());
    input.disabled = false;
    input.focus();
  }

  async function toggleLang() {
    lang = lang === 'pt' ? 'en' : 'pt';
    document.body.dataset.lang = lang;
    document.getElementById('lpt').classList.toggle('on', lang === 'pt');
    document.getElementById('len').classList.toggle('on', lang === 'en');
    out.innerHTML = '';
    await boot();
  }

  document.getElementById('langbtn').addEventListener('click', toggleLang);
  out.addEventListener('click', (e) => {
    if (input.disabled) return; 
    
    const chip = e.target.closest('[data-cmd]');
    if (chip) { run(chip.dataset.cmd); input.focus(); }
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !input.disabled) { run(input.value); input.value = ''; }
  });
  document.querySelector('.window').addEventListener('click', (e) => {
    if (!e.target.closest('a,button,image-slot,input')) input.focus();
  });

  boot();
  input.focus();
})();
</script>
</body>
</html>
